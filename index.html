<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>课程表</title>
  <style>
    :root {
      --purple-900: #4f42d7;
      --purple-800: #5c4be3;
      --purple-700: #7564f2;
      --page: #f2f3fa;
      --javaweb: #5e63e6;
      --javaweb-deep: #403ec2;
      --visual: #18b8b0;
      --visual-deep: #0a8f87;
      --ai: #efa62e;
      --ai-deep: #c67612;
      --practice: #ec5c7d;
      --practice-deep: #c93459;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f8f7fd 0%, #e8ecf8 100%);
      color: #222333;
      display: flex;
      justify-content: center;
      padding: 22px 10px;
    }

    .phone {
      width: min(100%, 430px);
      min-height: 860px;
      background: #fff;
      box-shadow: 0 18px 48px rgba(32, 36, 70, 0.18);
      overflow: hidden;
      border: 1px solid rgba(61, 57, 130, 0.1);
    }

    .statusbar,
    .appbar {
      background: #030303;
      color: #fff;
    }

    .statusbar {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 800;
    }

    .signal {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
    }

    .battery {
      min-width: 30px;
      padding: 1px 5px;
      border-radius: 6px;
      background: #fff;
      color: #111;
      text-align: center;
    }

    .appbar {
      height: 68px;
      display: grid;
      grid-template-columns: 58px 1fr 58px;
      align-items: center;
      padding: 0 8px;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border: 0;
      background: transparent;
      color: inherit;
      font-size: 34px;
      line-height: 1;
    }

    .app-title {
      text-align: center;
      font-size: 19px;
      font-weight: 800;
    }

    .page-title {
      height: 72px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      font-size: 21px;
      font-weight: 800;
      border-bottom: 1px solid #ececf4;
    }

    .back {
      font-size: 42px;
      line-height: 1;
      color: #111;
      transform: translateY(-1px);
    }

    .weekbar {
      background: var(--purple-700);
      color: #fff;
      padding: 14px 16px 12px;
      display: grid;
      gap: 12px;
      box-shadow: 0 4px 10px rgba(74, 58, 188, 0.25);
      position: relative;
      z-index: 3;
    }

    .weekbar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 16px;
      font-weight: 800;
    }

    .mode {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .today-dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.22);
    }

    .week-tabs {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .week-tab {
      border: 0;
      border-radius: 6px;
      min-height: 32px;
      background: rgba(255, 255, 255, 0.16);
      color: rgba(255, 255, 255, 0.88);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .week-tab.active {
      background: #fff;
      color: var(--purple-900);
    }

    .schedule {
      background: var(--page);
      min-height: 660px;
    }

    .date-strip {
      display: grid;
      grid-template-columns: 52px repeat(5, 1fr);
      min-height: 70px;
      background: var(--purple-900);
      color: #fff;
    }

    .month-cell {
      display: grid;
      place-items: center;
      background: rgba(50, 35, 172, 0.35);
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
      text-align: center;
    }

    .day-cell {
      display: grid;
      place-items: center;
      gap: 3px;
      padding: 10px 2px;
      border-left: 1px solid rgba(255, 255, 255, 0.08);
    }

    .day-name {
      font-size: 18px;
      font-weight: 800;
    }

    .day-date {
      font-size: 16px;
      font-style: italic;
    }

    .grid {
      display: grid;
      grid-template-columns: 52px repeat(5, minmax(0, 1fr));
      grid-template-rows: repeat(8, 82px);
      background:
        linear-gradient(to right, transparent 51px, rgba(215, 219, 234, 0.68) 52px, transparent 53px),
        repeating-linear-gradient(to bottom, transparent 0 81px, rgba(215, 219, 234, 0.7) 82px);
    }

    .lesson-label {
      grid-column: 1;
      padding-top: 14px;
      text-align: center;
      color: #788199;
      font-size: 18px;
      font-weight: 500;
    }

    .course {
      margin: 5px;
      border-radius: 7px;
      padding: 9px 7px;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      text-align: center;
      min-width: 0;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(38, 42, 80, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .course-title {
      font-size: 11px;
      line-height: 1.28;
      font-weight: 800;
      word-break: normal;
      overflow-wrap: break-word;
    }

    .course-meta {
      font-size: 10px;
      line-height: 1.25;
      opacity: 0.95;
      word-break: normal;
      overflow-wrap: break-word;
    }

    .course-time {
      font-size: 10px;
      opacity: 0.88;
    }

    .course-javaweb {
      background: linear-gradient(155deg, var(--javaweb), var(--javaweb-deep));
    }

    .course-visualization {
      background: linear-gradient(155deg, var(--visual), var(--visual-deep));
    }

    .course-ai {
      background: linear-gradient(155deg, var(--ai), var(--ai-deep));
    }

    .course-practice {
      background: linear-gradient(155deg, var(--practice), var(--practice-deep));
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 10px;
      padding: 14px 16px 18px;
      background: #fff;
      border-top: 1px solid #e7e9f2;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #565d73;
      font-size: 12px;
      min-width: 0;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 4px;
      flex: 0 0 auto;
    }

    .bottom-nav {
      height: 66px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      background: #fff;
      border-top: 1px solid #e6e8f1;
      color: #a9aebe;
      font-size: 13px;
    }

    .nav-item {
      display: grid;
      place-items: center;
      gap: 4px;
    }

    .nav-item.active {
      color: var(--purple-800);
    }

    .nav-icon {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: currentColor;
      opacity: 0.78;
    }

    @media (max-width: 380px) {
      body {
        padding: 0;
      }

      .phone {
        width: 100%;
        min-height: 100vh;
        border: 0;
      }

      .weekbar {
        padding-left: 12px;
        padding-right: 12px;
      }

      .week-tab {
        font-size: 12px;
        min-height: 30px;
      }

      .date-strip,
      .grid {
        grid-template-columns: 46px repeat(5, minmax(0, 1fr));
      }

      .grid {
        grid-template-rows: repeat(8, 78px);
      }

      .lesson-label {
        font-size: 17px;
      }

      .course {
        margin: 4px;
        padding: 7px 5px;
      }
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="移动教务课程表">
    <header class="statusbar">
      <span>12:01</span>
      <span class="signal">5G 5G <span class="battery">82</span></span>
    </header>

    <section class="appbar" aria-label="应用标题">
      <button class="icon-btn" aria-label="返回">‹</button>
      <div class="app-title">移动教务</div>
      <button class="icon-btn" aria-label="更多">⋮</button>
    </section>

    <section class="page-title">
      <span class="back">‹</span>
      <span>课程表</span>
    </section>

    <section class="weekbar" aria-label="教学周选择">
      <div class="weekbar-top">
        <span id="currentWeekText">第1周</span>
        <span class="mode">默认节次模式 <span class="today-dot">今</span></span>
      </div>
      <nav class="week-tabs" aria-label="切换教学周">
        <button class="week-tab active" type="button" data-week="1" aria-label="第1周">1</button>
        <button class="week-tab" type="button" data-week="2" aria-label="第2周">2</button>
        <button class="week-tab" type="button" data-week="3" aria-label="第3周">3</button>
        <button class="week-tab" type="button" data-week="4" aria-label="第4周">4</button>
        <button class="week-tab" type="button" data-week="5" aria-label="第5周">5</button>
        <button class="week-tab" type="button" data-week="6" aria-label="第6周">6</button>
        <button class="week-tab" type="button" data-week="7" aria-label="第7周">7</button>
      </nav>
    </section>

    <section class="schedule" id="schedule" aria-live="polite"></section>

    <section class="legend" aria-label="课程颜色说明">
      <div class="legend-item"><span class="swatch course-javaweb"></span><span>JavaWeb服务应用开发项目实战</span></div>
      <div class="legend-item"><span class="swatch course-visualization"></span><span>数据可视化</span></div>
      <div class="legend-item"><span class="swatch course-ai"></span><span>人工智能</span></div>
      <div class="legend-item"><span class="swatch course-practice"></span><span>项目综合实践</span></div>
    </section>

    <footer class="bottom-nav" aria-label="底部导航">
      <div class="nav-item active"><span class="nav-icon"></span><span>课表</span></div>
      <div class="nav-item"><span class="nav-icon"></span><span>工具</span></div>
      <div class="nav-item"><span class="nav-icon"></span><span>消息</span></div>
      <div class="nav-item"><span class="nav-icon"></span><span>我的</span></div>
    </footer>
  </main>

  <script>
    const courseCatalog = {
      javaweb: {
        title: 'JWeb实战',
        fullTitle: 'JavaWeb服务应用开发项目实战',
        colorClass: 'course-javaweb'
      },
      visualization: {
        title: '数据可视化',
        fullTitle: '数据可视化',
        colorClass: 'course-visualization'
      },
      ai: {
        title: '人工智能',
        fullTitle: '人工智能',
        colorClass: 'course-ai'
      },
      practice: {
        title: '项目综合实践',
        fullTitle: '项目综合实践',
        colorClass: 'course-practice'
      }
    };

    const weeks = [
      {
        weekNo: 1,
        range: '7.06-7.12',
        month: '7',
        dates: [6, 7, 8, 9, 10],
        courses: [
          { day: 4, start: 1, end: 9, type: 'javaweb', room: 'SA604软件开发与测试实验室', time: '01-08节' },
          { day: 5, start: 1, end: 9, type: 'javaweb', room: 'SA604软件开发与测试实验室', time: '01-08节' }
        ]
      },
      {
        weekNo: 2,
        range: '7.13-7.19',
        month: '7',
        dates: [13, 14, 15, 16, 17],
        courses: [
          { day: 1, start: 1, end: 9, type: 'javaweb', room: 'SA604', time: '01-08节' },
          { day: 2, start: 1, end: 9, type: 'javaweb', room: 'SA604', time: '01-08节' },
          { day: 3, start: 1, end: 5, type: 'javaweb', room: 'SA604', time: '01-04节' },
          { day: 4, start: 1, end: 7, type: 'javaweb', room: 'SA604', time: '01-06节' },
          { day: 5, start: 1, end: 7, type: 'javaweb', room: 'SA604', time: '01-06节' }
        ]
      },
      {
        weekNo: 3,
        range: '7.20-7.26',
        month: '7',
        dates: [20, 21, 22, 23, 24],
        courses: [
          { day: 1, start: 1, end: 9, type: 'javaweb', room: 'SA604', time: '01-08节' },
          { day: 2, start: 1, end: 9, type: 'javaweb', room: 'SA604', time: '01-08节' },
          { day: 3, start: 1, end: 5, type: 'visualization', room: 'JB311', time: '01-04节' },
          { day: 4, start: 1, end: 5, type: 'visualization', room: 'JB311', time: '01-04节' },
          { day: 5, start: 1, end: 5, type: 'visualization', room: 'JB311', time: '01-04节' }
        ]
      },
      {
        weekNo: 4,
        range: '7.27-8.02',
        month: '7',
        dates: [27, 28, 29, 30, 31],
        courses: [
          { day: 1, start: 1, end: 5, type: 'visualization', room: 'SA302大数据实验室', time: '01-04节' },
          { day: 1, start: 7, end: 9, type: 'visualization', room: 'SA302大数据实验室', time: '07-08节' },
          { day: 2, start: 1, end: 5, type: 'visualization', room: 'SA302大数据实验室', time: '01-04节' },
          { day: 2, start: 7, end: 9, type: 'visualization', room: 'SA302大数据实验室', time: '07-08节' },
          { day: 3, start: 1, end: 5, type: 'visualization', room: 'SA302大数据实验室', time: '01-04节' },
          { day: 4, start: 1, end: 5, type: 'visualization', room: 'SA302大数据实验室', time: '01-04节' },
          { day: 5, start: 1, end: 5, type: 'visualization', room: 'SA302大数据实验室', time: '01-04节' }
        ]
      },
      {
        weekNo: 5,
        range: '8.03-8.09',
        month: '8',
        dates: [3, 4, 5, 6, 7],
        courses: [
          { day: 1, start: 1, end: 5, type: 'ai', room: 'JB305', time: '01-04节' },
          { day: 2, start: 1, end: 5, type: 'ai', room: 'JB305', time: '01-04节' },
          { day: 3, start: 1, end: 9, type: 'practice', room: 'SA602智能软件实验室', time: '01-08节' },
          { day: 4, start: 1, end: 9, type: 'practice', room: 'SA602智能软件实验室', time: '01-08节' },
          { day: 5, start: 1, end: 9, type: 'practice', room: 'SA602智能软件实验室', time: '01-08节' }
        ]
      },
      {
        weekNo: 6,
        range: '8.10-8.16',
        month: '8',
        dates: [10, 11, 12, 13, 14],
        courses: [
          { day: 1, start: 1, end: 5, type: 'ai', room: 'JB305', time: '01-04节' },
          { day: 2, start: 1, end: 5, type: 'ai', room: 'JB305', time: '01-04节' },
          { day: 3, start: 1, end: 9, type: 'practice', room: 'SA602智能软件实验室', time: '01-08节' },
          { day: 4, start: 1, end: 9, type: 'practice', room: 'SA602智能软件实验室', time: '01-08节' },
          { day: 5, start: 1, end: 9, type: 'practice', room: 'SA602智能软件实验室', time: '01-08节' }
        ]
      },
      {
        weekNo: 7,
        range: '8.17-8.23',
        month: '8',
        dates: [17, 18, 19, 20, 21],
        courses: [
          { day: 1, start: 1, end: 9, type: 'practice', room: 'SA602智能软件实验室', time: '01-08节' },
          { day: 2, start: 1, end: 9, type: 'practice', room: 'SA602智能软件实验室', time: '01-08节' }
        ]
      }
    ];

    const schedule = document.querySelector('#schedule');
    const tabs = document.querySelectorAll('.week-tab');
    const currentWeekText = document.querySelector('#currentWeekText');
    const weekdays = ['周一', '周二', '周三', '周四', '周五'];

    function createElement(tag, className, text) {
      const element = document.createElement(tag);
      if (className) {
        element.className = className;
      }
      if (text) {
        element.textContent = text;
      }
      return element;
    }

    function renderWeek(week) {
      schedule.innerHTML = '';
      currentWeekText.textContent = `第${week.weekNo}周`;

      const strip = createElement('div', 'date-strip');
      const month = createElement('div', 'month-cell');
      month.innerHTML = `${week.month}<br>月`;
      strip.appendChild(month);

      weekdays.forEach((name, index) => {
        const day = createElement('div', 'day-cell');
        day.appendChild(createElement('span', 'day-name', name));
        day.appendChild(createElement('span', 'day-date', String(week.dates[index])));
        strip.appendChild(day);
      });

      const grid = createElement('div', 'grid');
      for (let lesson = 1; lesson <= 8; lesson += 1) {
        const label = createElement('div', 'lesson-label', String(lesson).padStart(2, '0'));
        label.style.gridRow = String(lesson);
        grid.appendChild(label);
      }

      week.courses.forEach((course) => {
        const catalog = courseCatalog[course.type];
        const block = createElement('article', `course ${catalog.colorClass}`);
        block.style.gridColumn = String(course.day + 1);
        block.style.gridRow = `${course.start} / ${course.end}`;
        block.setAttribute('aria-label', `${catalog.fullTitle} ${course.room} ${course.time}`);
        block.appendChild(createElement('div', 'course-title', catalog.title));
        block.appendChild(createElement('div', 'course-meta', course.room));
        block.appendChild(createElement('div', 'course-time', course.time));
        grid.appendChild(block);
      });

      schedule.appendChild(strip);
      schedule.appendChild(grid);
    }

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        const weekNo = Number(tab.dataset.week);
        tabs.forEach((item) => item.classList.toggle('active', item === tab));
        renderWeek(weeks.find((week) => week.weekNo === weekNo));
      });
    });

    renderWeek(weeks[0]);
  </script>
</body>
</html>
